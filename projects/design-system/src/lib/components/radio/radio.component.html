<label class="iho-radio" [dir]="dir" [attr.for]="id">
    <input class="iho-radio__native" type="radio" [id]="id" [name]="groupName" [disabled]="groupDisabled || disabled"
        [checked]="checked" [value]="radioValue" (change)="onNativeChange($event)" (blur)="onTouched()" />

    <span class="iho-radio__box" [class.is-checked]="checked" [class.is-disabled]="groupDisabled || disabled">
        <span class="iho-radio__dot" aria-hidden="true"></span>
    </span>

    <span class="iho-radio__label">{{ label }}</span>
</label>
