<div class="accordion" [class.accordion--disabled]="disabled" [class.accordion--sm]="size === 'sm'"
    [class.accordion--md]="size === 'md'">
    <button class="accordion__header" [disabled]="disabled" (click)="toggle()" type="button">

        <span class="accordion__title">{{ title }}</span>

        <!-- <svg class="accordion__icon" [class.accordion__icon--rotated]="expanded" width="20" height="20"
            viewBox="0 0 20 20" fill="none">
            <path d="M15 12.5L10 7.5L5 12.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg> -->
        <svg class="accordion__icon" [class.accordion__icon--rotated]="expanded" width="20" height="20"
            viewBox="0 0 20 20" fill="none">
            <path
                d="M5.5 8.5L9.29289 12.29289C9.62623 12.62623 9.79289 12.79289 10 12.79289C10.20711 12.79289 10.37377 12.62623 10.70711 12.29289L14.5 8.5"
                stroke="#16181B" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </button>

    <div class="accordion__content-wrapper" [@expandCollapse]="animationState">
        <div class="accordion__content">
            <ng-content></ng-content>
        </div>
    </div>
</div>
