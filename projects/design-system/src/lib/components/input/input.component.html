<!-- قالب floating -->
<div *ngIf="template === 'floating'" class="input floating-input"
[class.input-md]="size === 'md'" [class.input-lg]="size === 'lg'"
[class.is-required]="required" [ngClass]="[roundedClass]"
    [class.input--disabled]="disabled" [class.input--error]="errorFloating">

    <i *ngIf="icon" [class]="icon + ' input-icon ' + iconClass"></i>

    <label class="input__label" [attr.for]="inputId" [class.input__label--focused]="isFocused"
        [class.input__label--active]="value && !isFocused" [class.input__label--error]="errorFloating"
        [class.input__label--disabled]="disabled" [class.input__label--has-icon]="icon">
        {{ label }}
        <span class="input__ph" aria-hidden="true">
            <span class="ast" *ngIf="required"> *</span>
        </span>
    </label>

    <input class="input__field" [attr.id]="inputId" [attr.placeholder]="placeholder" [attr.aria-required]="required"
        [attr.aria-invalid]="!!errorFloating" [attr.aria-describedby]="errorFloating ? (inputId + '-err') : null" [attr.type]="type"
        [attr.autocomplete]="autocomplete" [attr.name]="name" [disabled]="disabled" [value]="value"
        [readonly]="readonly"
        (input)="handleInput($event)" (focus)="handleFocus()" (blur)="handleBlur()" (compositionstart)="composing=true"
        (compositionend)="composing=false; handleInput($event)" [class.input__field--has-icon]="icon" />

    <div class="input__error" *ngIf="errorFloating" [attr.id]="inputId + '-err'">{{ errorFloating }}</div>
</div>

<!-- قالب inline -->
<div *ngIf="template === 'inline'" class="input inline-input" 
[class.input-md]="size === 'md'" [class.input-lg]="size === 'lg'" [class.is-required]="required" [ngClass]="[roundedClass]"
    [class.input--disabled]="disabled" [class.input--error]="errorInline" [class.input--success]="successInline" 
    >
    
    <i *ngIf="icon" [class]="icon + ' input-icon ' + iconClass "></i>

    <input class="input__field" [ngClass]="dirClass" [attr.id]="inputId" [attr.required]="required" [attr.aria-required]="required"
        [attr.aria-invalid]="!!errorInline" [attr.aria-describedby]="errorInline ? (inputId + '-err') : null"
        [attr.placeholder]="placeholder" [attr.type]="type" [attr.autocomplete]="autocomplete" [attr.name]="name"
        [disabled]="disabled"  [readonly]="readonly" [value]="value" (input)="handleInput($event)" (focus)="handleFocus()"
        (blur)="handleBlur()" (compositionstart)="composing=true"
        (compositionend)="composing=false; handleInput($event)" [class.input__field--has-icon]="icon" />

    <span class="input__ph" aria-hidden="true">
        {{ placeholder }}<span class="ast" *ngIf="required"> *</span>
    </span>

    <ng-content></ng-content>


</div>
<div *ngIf="hint" class="input__hint_inline" [attr.id]="inputId + '-hint'">{{ hint }}</div>
<div *ngIf="errorInline" class="input__error_inline" [attr.id]="inputId + '-err'">{{ errorInline }}</div>
<div *ngIf="successInline" class="input__success_inline" [attr.id]="inputId + '-success'">{{ successInline }}</div>
