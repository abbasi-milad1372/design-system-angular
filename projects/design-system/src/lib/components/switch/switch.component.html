<label class="iho-switch" dir="rtl" [attr.for]="id">
    <!-- متن (سمت چپ در RTL) -->
    <span class="iho-switch__label" *ngIf="label">{{ label }}</span>

    <!-- ترک + نُب -->
    <span class="iho-switch__track" [class.is-on]="value" [class.is-disabled]="disabled">
        <span class="iho-switch__thumb"></span>
    </span>

    <!-- ورودی واقعی -->
    <input class="iho-switch__native" type="checkbox" [id]="id" [name]="name || id" [required]="required"
        [disabled]="disabled" [checked]="value" (change)="onNativeChange($any($event.target).checked)"
        (blur)="onTouched()" />
</label>
