<div class="iho-bottomsheet" [class.is-open]="isOpen" [class.is-disabled]="disabled" [class.full-height]="fullHeight"
  [attr.dir]="dir" [ngClass]="positionClass">

  <div class="iho-bottomsheet__overlay" (click)="close()"></div>

  <div class="iho-bottomsheet__content">
    <div class="iho-bottomsheet__title">
      <div class="flex gap-2 items-center">
        <i *ngIf="iconClass" [class]="iconClass"></i>
        <h2>{{ title }}</h2>
      </div>
      <button class="iho-bottomsheet__close-btn" (click)="close()" aria-label="بستن">
        <i class="iho-icon-multiplication-sign text-xl"></i>
      </button>
    </div>
    <div class="iho-bottomsheet__content-container" [class.include-gap]="contentContainerPadding">
      <ng-container #contentContainer></ng-container>
    </div>
  </div>
</div>
