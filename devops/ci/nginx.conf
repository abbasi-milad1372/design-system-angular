
user  root;
pid /run/nginx.pid;
worker_processes  auto;

events {
    worker_connections  2048;
}

http {

    limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
    # limit_req_zone  $http_x_forwarded_for zone=zone:16m rate=1r/s;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # real_ip_header X-Forwarded-For;
    # set_real_ip_from 10.0.2.5;
    # set_real_ip_from 10.0.2.253;
    # real_ip_recursive on;
    
    upstream iis-stage {
        server 172.16.23.202:80 fail_timeout=20s max_fails=3;
    }

    # upstream iis-stage-hotfix {
    #     server 172.16.23.202:85 fail_timeout=20s max_fails=3;
    # }

    map $upstream_http_docker_distribution_api_version $docker_distribution_api_version {
        '' 'registry/2.0';
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format grafana_logs
        '{"@timestamp":"$time_iso8601",'
        '"host":"$hostname",'
        '"server_ip":"$server_addr",'
        '"client_ip":"$remote_addr",'
        '"xff":"$http_x_forwarded_for",'
        '"domain":"$host",'
        '"url":"$uri",'
        '"referer":"$http_referer",'
        '"args":"$args",'
        '"upstreamtime":"$upstream_response_time",'
        '"responsetime":"$request_time",'
        '"request_method":"$request_method",'
        '"status":"$status",'
        '"size":"$body_bytes_sent",'
        '"request_body":"$request_body",'
        '"request_length":"$request_length",'
        '"protocol":"$server_protocol",'
        '"upstreamhost":"$upstream_addr",'
        '"file_dir":"$request_filename",'
        '"http_cookie":"$http_custom_cookie",'
        '"proxy_add_x_forwarded_for":"$proxy_add_x_forwarded_for",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log grafana_logs;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
      application/atom+xml
      application/geo+json
      application/javascript
      application/x-javascript
      application/json
      application/ld+json
      application/manifest+json
      application/rdf+xml
      application/rss+xml
      application/xhtml+xml
      application/xml
      font/eot
      font/otf
      font/ttf
      image/svg+xml
      text/css
      text/javascript
      text/plain
      text/xml;

    server {
        listen       80;
        server_name  localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Optional: cache static assets aggressively
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
        }

        error_page 404 /index.html;
    }


}
